# Netlify Configuration File
# This file configures how Netlify builds and deploys your site

[build]
  # Directory to publish (root directory in this case)
  publish = "."
  
  # Build command (none needed for static site)
  command = ""

# Redirect rules
[[redirects]]
  # Serve .well-known files directly (Digital Asset Links, etc.)
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = true

[[redirects]]
  # Serve delete-account.html directly
  from = "/delete-account.html"
  to = "/delete-account.html"
  status = 200
  force = true

[[redirects]]
  # Serve privacy-policy.html directly
  from = "/privacy-policy.html"
  to = "/privacy-policy.html"
  status = 200
  force = true

[[redirects]]
  # Serve terms-and-conditions.html directly
  from = "/terms-and-conditions.html"
  to = "/terms-and-conditions.html"
  status = 200
  force = true

[[redirects]]
  # Redirect root to landing page
  from = "/"
  to = "/landing.html"
  status = 200

[[redirects]]
  # SPA fallback for client-side routing
  from = "/*"
  to = "/landing.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers for .well-known (Digital Asset Links)
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
